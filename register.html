<div class="form-group">
    <label>ตั้งรหัสผ่าน</label>
    <input type="password" id="p1" placeholder="รหัสผ่าน">
</div>
<div class="form-group">
    <label>ยืนยันรหัสผ่านอีกครั้ง</label>
    <input type="password" id="p2" placeholder="พิมพ์รหัสผ่านเดิมอีกครั้ง">
</div>

<button type="button" class="btn-submit" onclick="checkPass()">ยืนยันสมัครสมาชิก</button>

<script>
    function checkPass() {
        var p1 = document.getElementById('p1').value;
        var p2 = document.getElementById('p2').value;
        if (p1 != p2) {
            alert("รหัสผ่านไม่ตรงกัน กรุณาตรวจสอบอีกครั้งครับคุณรักษ์");
        } else if (p1 == "") {
            alert("กรุณาตั้งรหัสผ่านด้วยครับ");
        } else {
            alert("รหัสผ่านตรงกัน เรียบร้อยครับ!");
            // ตรงนี้อนาคตเราจะสั่งให้บันทึกข้อมูลลงระบบครับ
        }
    }
</script>

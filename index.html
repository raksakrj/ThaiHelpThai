<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ไทยช่วยไทย | Thai Help Thai</title>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Kanit', sans-serif;
        }

        /* ส่วนหัวที่รวมพื้นหลังโลโก้และตัวหนังสือ */
        .top-header {
            /* พื้นหลังวิวธรรมชาติที่ซอฟต์ตา */
            background: linear-gradient(rgba(255,255,255,0.3), rgba(255,255,255,0.3)), 
                        url('https://images.unsplash.com/photo-1500382017468-9049fed747ef?auto=format&fit=crop&w=1500&q=80');
            background-size: cover;
            background-position: center;
            padding: 60px 40px;
            display: flex;
            align-items: center; 
            justify-content: flex-start; 
            gap: 40px; 
            min-height: 400px;
        }

        /* ลดขนาดโลโก้ลง 50% เหลือ 400px เพื่อความสมดุล */
        .logo-img {
            width: 400px;
            height: auto;
            display: block;
            filter: drop-shadow(0 10px 20px rgba(0,0,0,0.1));
        }

        /* ส่วนข้อความที่ต่อจากโลโก้ */
        .welcome-text {
            color: #1b4332;
            text-align: left;
        }

        .welcome-text h1 {
            font-size: 3.5rem;
            margin: 0;
            color: #2d6a4f;
            text-shadow: 1px 1px 2px rgba(255,255,255,0.8);
        }

        .welcome-text p {
            font-size: 1.8rem;
            margin: 10px 0 0 0;
            color: #333;
            line-height: 1.4;
            font-weight: 400;
        }

        /* ปรับแต่งสำหรับหน้าจอขนาดเล็ก */
        @media (max-width: 900px) {
            .top-header {
                flex-direction: column;
                text-align: center;
                padding: 40px 20px;
            }
            .logo-img {
                width: 80%;
                max-width: 300px;
            }
            .welcome-text {
                text-align: center;
            }
            .welcome-text h1 {
                font-size: 2.5rem;
            }
        }
    </style>
</head>
<body>

    <header class="top-header">
        <img src="logo.png" alt="โลโก้ไทยช่วยไทย" class="logo-img">
        
        <div class="welcome-text">
            <h1>ยินดีต้อนรับสู่ไทยช่วยไทย</h1>
            <p>จากมือผู้ผลิต สู่ใจผู้บริโภค<br>โดยไม่ผ่านคนกลาง</p>
        </div>
    </header>

</body>
</html>

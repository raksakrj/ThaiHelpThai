<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ไทยช่วยไทย | Thai Help Thai</title>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Kanit', sans-serif;
        }

        /* ส่วนหัวที่รวมพื้นหลังโลโก้และตัวหนังสือ */
        .top-header {
            background: linear-gradient(rgba(255,255,255,0.4), rgba(255,255,255,0.4)), 
                        url('https://images.unsplash.com/photo-1500382017468-9049fed747ef?auto=format&fit=crop&w=1500&q=80');
            background-size: cover;
            background-position: center;
            padding: 40px 20px;
            display: flex;
            align-items: center; 
            justify-content: flex-start; 
            gap: 30px; 
            min-height: 450px;
        }

        /* ปรับขนาดโลโก้ 800px ตามสั่ง และดึงไฟล์ logo.png */
        .logo-img {
            width: 800px;
            height: auto;
            display: block;
        }

        /* ส่วนข้อความที่ต่อจากโลโก้ */
        .welcome-text {
            color: #1b4332;
            text-align: left;
        }

        .welcome-text h1 {
            font-size: 3rem;
            margin: 0;
            color: #2d6a4f;
        }

        .welcome-text p {
            font-size: 1.6rem;
            margin: 10px 0 0 0;
            color: #444;
            line-height: 1.4;
        }
    </style>
</head>
<body>

    <header class="top-header">
        <img src="logo.png" alt="โลโก้ไทยช่วยไทย" class="logo-img">
        
        <div class="welcome-text">
            <h1>ยินดีต้อนรับสู่ไทยช่วยไทย</h1>
            <p>จากมือผู้ผลิต สู่ใจผู้บริโภค<br>โดยไม่ผ่านคนกลาง</p>
        </div>
    </header>

</body>
</html>

<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ไทยช่วยไทย | Thai Help Thai</title>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Kanit', sans-serif;
        }

        /* ส่วนหัว: ปรับความสูงให้พอดี (Balanced Height) */
        .top-header {
            background: linear-gradient(rgba(255,255,255,0.3), rgba(255,255,255,0.3)), 
                        url('https://images.unsplash.com/photo-1500382017468-9049fed747ef?auto=format&fit=crop&w=1500&q=80');
            background-size: cover;
            background-position: center;
            
            /* จุดที่รักษ์ต้องการปรับ: ลด padding และ min-height ลง */
            padding: 20px 40px; /* ลดระยะห่างบน-ล่าง เหลือ 20px */
            min-height: 250px;  /* ลดความสูงขั้นต่ำลงเพื่อให้พอดีกับรูปโลโก้ */
            
            display: flex;
            align-items: center; 
            justify-content: flex-start; 
            gap: 40px; 
        }

        /* โลโก้ขนาด 400px ที่รักษ์โอเคแล้ว */
        .logo-img {
            width: 400px;
            height: auto;
            display: block;
            filter: drop-shadow(0 5px 15px rgba(0,0,0,0.1));
        }

        /* ข้อความที่รักษ์โอเคแล้ว */
        .welcome-text {
            color: #1b4332;
            text-align: left;
        }

        .welcome-text h1 {
            font-size: 3rem;
            margin: 0;
            color: #2d6a4f;
            text-shadow: 1px 1px 2px rgba(255,255,255,0.8);
        }

        .welcome-text p {
            font-size: 1.6rem;
            margin: 5px 0 0 0;
            color: #333;
            line-height: 1.3;
        }

        @media (max-width: 900px) {
            .top-header {
                flex-direction: column;
                text-align: center;
                padding: 30px 20px;
            }
            .logo-img { width: 300px; }
            .welcome-text h1 { font-size: 2.2rem; }
        }
    </style>
</head>
<body>

    <header class="top-header">
        <img src="logo.png" alt="โลโก้ไทยช่วยไทย" class="logo-img">
        
        <div class="welcome-text">
            <h1>ยินดีต้อนรับสู่ไทยช่วยไทย</h1>
            <p>จากมือผู้ผลิต สู่ใจผู้บริโภค<br>โดยไม่ผ่านคนกลาง</p>
        </div>
    </header>

</body>
</html>

<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ไทยช่วยไทย | Thai Help Thai</title>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css?v=3">
</head>
<body>

    <header class="top-header">
        <img src="logo.png" alt="โลโก้ไทยช่วยไทย" class="logo-img">
        
        <div class="welcome-text">
            <h1>ยินดีต้อนรับสู่ไทยช่วยไทย</h1>
            <p>จากมือผู้ผลิต สู่ใจผู้บริโภค<br>โดยไม่ผ่านคนกลาง</p>
            
            <div id="live-clock" class="clock-style">
                <span id="date"></span> | <span id="time"></span>
            </div>
        </div>

        <div class="member-actions">
            <button class="btn-login">เข้าสู่ระบบ</button>
            <button class="btn-register">สมัครสมาชิก</button>
        </div>
    </header>

    <script src="script.js"></script>
</body>
</html>

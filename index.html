<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ไทยช่วยไทย | Thai Help Thai Premium</title>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Kanit', sans-serif;
            /* เปลี่ยนพื้นหลังเป็นสีเขียวเข้มลึก ช่วยให้ดูหรูและแพงขึ้น */
            background-color: #0d1b15; 
            color: #e0e0e0;
        }

        /* ส่วนหัว: ปรับให้มืดและดูมีมิติ */
        .top-header {
            background: linear-gradient(rgba(13, 27, 21, 0.6), rgba(13, 27, 21, 0.6)), 
                        url('https://images.unsplash.com/photo-1500382017468-9049fed747ef?auto=format&fit=crop&w=1500&q=80');
            background-size: cover;
            background-position: center;
            padding: 15px 40px; 
            display: flex;
            align-items: center; 
            justify-content: flex-start; 
            gap: 40px; 
            border-bottom: 1px solid #2d6a4f; /* เส้นขอบบางๆ สีเขียวเข้ม */
        }

        .logo-img {
            width: 400px;
            height: auto;
            display: block;
            /* เพิ่มเงาให้โลโก้ดูนูนออกมา */
            filter: drop-shadow(0 10px 30px rgba(0,0,0,0.5));
        }

        .welcome-text {
            text-align: left;
        }

        .welcome-text h1 {
            font-size: 3rem;
            margin: 0;
            /* ใช้สีทองจางๆ เพื่อความหรูหรา */
            color: #d4af37; 
            letter-spacing: 1px;
        }

        .welcome-text p {
            font-size: 1.6rem;
            margin: 5px 0 0 0;
            color: #b7e4c7; /* สีเขียวอ่อนแบบนวลตา */
            line-height: 1.3;
            font-weight: 300;
        }

        /* ส่วนเนื้อหาที่ดูพรีเมียม */
        .content-area {
            padding: 100px 40px;
            text-align: center;
            background: radial-gradient(circle at center, #1a3027 0%, #0d1b15 100%);
        }

        .content-area h2 {
            color: #d4af37;
            font-size: 2.5rem;
            margin-bottom: 25px;
            font-weight: 400;
        }

        .content-area p {
            color: #95d5b2;
            font-size: 1.4rem;
            max-width: 850px;
            margin: 0 auto;
            line-height: 1.8;
            letter-spacing: 0.5px;
        }

        @media (max-width: 900px) {
            .top-header {
                flex-direction: column;
                text-align: center;
                padding: 30px 20px;
            }
            .logo-img { width: 300px; }
            .welcome-text h1 { font-size: 2.2rem; }
        }
    </style>
</head>
<body>

    <header class="top-header">
        <img src="logo.png" alt="โลโก้ไทยช่วยไทย" class="logo-img">
        
        <div class="welcome-text">
            <h1>ยินดีต้อนรับสู่ไทยช่วยไทย</h1>
            <p>จากมือผู้ผลิต สู่ใจผู้บริโภค<br>โดยไม่ผ่านคนกลาง</p>
        </div>
    </header>

    <main class="content-area">
        <h2>เอกลักษณ์แห่งผลผลิตไทย</h2>
        <p>สัมผัสคุณค่าจากแหล่งกำเนิดที่แท้จริง เราคัดสรรสิ่งที่ดีที่สุดจากมือเกษตรกรไทย <br> ส่งตรงถึงคุณด้วยความใส่ใจและความโปร่งใสในทุกขั้นตอน</p>
    </main>

</body>
</html>

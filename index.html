<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ไทยช่วยไทย | Thai Help Thai</title>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Kanit', sans-serif;
            /* ปรับสีพื้นหลังเป็นสีขาวนวลอมเขียว ให้ดู Balance กับภาพวิว */
            background-color: #F8FDF9; 
        }

        /* ส่วนหัวที่รักษ์พอใจแล้ว */
        .top-header {
            background: linear-gradient(rgba(255,255,255,0.3), rgba(255,255,255,0.3)), 
                        url('https://images.unsplash.com/photo-1500382017468-9049fed747ef?auto=format&fit=crop&w=1500&q=80');
            background-size: cover;
            background-position: center;
            padding: 10px 40px; 
            display: flex;
            align-items: center; 
            justify-content: flex-start; 
            gap: 40px; 
            border-bottom: 3px solid #52b788; /* เส้นขอบสีเขียวช่วยแบ่งส่วนให้ชัดเจน */
        }

        .logo-img {
            width: 400px;
            height: auto;
            display: block;
            filter: drop-shadow(0 5px 10px rgba(0,0,0,0.1));
        }

        .welcome-text {
            color: #1b4332;
            text-align: left;
        }

        .welcome-text h1 {
            font-size: 2.8rem;
            margin: 0;
            color: #2d6a4f;
            text-shadow: 1px 1px 2px rgba(255,255,255,0.8);
        }

        .welcome-text p {
            font-size: 1.5rem;
            margin: 5px 0 0 0;
            color: #333;
            line-height: 1.2;
        }

        /* ส่วนเนื้อหาด้านล่าง (ลองใส่ตัวอย่างให้ดูความเข้ากันของสีครับ) */
        .content-area {
            padding: 60px 40px;
            text-align: center;
        }

        .content-area h2 {
            color: #2d6a4f;
            font-size: 2.2rem;
            margin-bottom: 20px;
        }

        .content-area p {
            color: #444;
            font-size: 1.3rem;
            max-width: 800px;
            margin: 0 auto;
        }

        @media (max-width: 900px) {
            .top-header {
                flex-direction: column;
                text-align: center;
                padding: 20px;
                gap: 20px;
            }
            .logo-img { width: 280px; }
            .welcome-text h1 { font-size: 2rem; }
        }
    </style>
</head>
<body>

    <header class="top-header">
        <img src="logo.png" alt="โลโก้ไทยช่วยไทย" class="logo-img">
        
        <div class="welcome-text">
            <h1>ยินดีต้อนรับสู่ไทยช่วยไทย</h1>
            <p>จากมือผู้ผลิต สู่ใจผู้บริโภค<br>โดยไม่ผ่านคนกลาง</p>
        </div>
    </header>

    <main class="content-area">
        <h2>พื้นที่แห่งการแบ่งปันและสนับสนุนผู้ผลิตไทย</h2>
        <p>เราตั้งใจสร้างพื้นที่นี้ขึ้นมาเพื่อให้ผู้บริโภคได้เข้าถึงสินค้าคุณภาพจากมือผู้ผลิตโดยตรง เพื่อสร้างรอยยิ้มให้กับทั้งคนปลูกและคนกินครับ</p>
    </main>

</body>
</html>

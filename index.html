<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ไทยช่วยไทย | Thai Help Thai</title>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Kanit', sans-serif;
        }

        /* ส่วนหัว: ปรับให้แคบลงและสมดุลกับเนื้อหาด้านใน */
        .top-header {
            background: linear-gradient(rgba(255,255,255,0.3), rgba(255,255,255,0.3)), 
                        url('https://images.unsplash.com/photo-1500382017468-9049fed747ef?auto=format&fit=crop&w=1500&q=80');
            background-size: cover;
            background-position: center;
            
            /* ลด Padding ให้เหลือแค่ 10px บน-ล่าง เพื่อความ Balance */
            padding: 10px 40px; 
            
            /* ไม่กำหนด min-height เพื่อให้ความสูงขยับตามรูปภาพ */
            display: flex;
            align-items: center; 
            justify-content: flex-start; 
            gap: 40px; 
            border-bottom: 3px solid #52b788;
        }

        /* โลโก้ขนาด 400px ที่รักษ์โอเคแล้ว */
        .logo-img {
            width: 400px;
            height: auto;
            display: block;
            filter: drop-shadow(0 5px 10px rgba(0,0,0,0.1));
        }

        /* ข้อความต้อนรับ */
        .welcome-text {
            color: #1b4332;
            text-align: left;
        }

        .welcome-text h1 {
            font-size: 2.8rem;
            margin: 0;
            color: #2d6a4f;
            text-shadow: 1px 1px 2px rgba(255,255,255,0.8);
        }

        .welcome-text p {
            font-size: 1.5rem;
            margin: 5px 0 0 0;
            color: #333;
            line-height: 1.2;
        }

        /* สำหรับมือถือ */
        @media (max-width: 900px) {
            .top-header {
                flex-direction: column;
                text-align: center;
                padding: 20px;
                gap: 20px;
            }
            .logo-img { width: 280px; }
            .welcome-text h1 { font-size: 2rem; }
        }
    </style>
</head>
<body>

    <header class="top-header">
        <img src="logo.png" alt="โลโก้ไทยช่วยไทย" class="logo-img">
        
        <div class="welcome-text">
            <h1>ยินดีต้อนรับสู่ไทยช่วยไทย</h1>
            <p>จากมือผู้ผลิต สู่ใจผู้บริโภค<br>โดยไม่ผ่านคนกลาง</p>
        </div>
    </header>

</body>
</html>

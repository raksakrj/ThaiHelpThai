<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ไทยช่วยไทย | Thai Help Thai</title>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Kanit', sans-serif;
            background-color: #f8f9fa;
        }

        /* ส่วนหัวที่รวมพื้นหลังโลโก้และตัวหนังสือ */
        .top-header {
            /* ใส่รูปพื้นหลังวิวธรรมชาติที่ซอฟต์ตา */
            background: linear-gradient(rgba(255,255,255,0.4), rgba(255,255,255,0.4)), 
                        url('https://images.unsplash.com/photo-1500382017468-9049fed747ef?auto=format&fit=crop&w=1500&q=80');
            background-size: cover;
            background-position: center;
            padding: 40px 20px;
            display: flex;
            align-items: center; /* จัดให้โลโก้กับตัวหนังสืออยู่กึ่งกลางแนวตั้งร่วมกัน */
            justify-content: flex-start; /* วางทุกอย่างเริ่มจากซ้ายมือ */
            gap: 40px; /* ระยะห่างระหว่างโลโก้กับข้อความ */
            min-height: 400px; /* ความสูงขั้นต่ำเพื่อให้เห็นภาพพื้นหลังสวยๆ */
        }

        /* ปรับขนาดโลโก้ 800px ตามสั่ง */
        .logo-img {
            width: 800px;
            height: auto;
            filter: drop-shadow(0 10px 20px rgba(0,0,0,0.15));
        }

        /* ส่วนข้อความที่ต่อจากโลโก้ */
        .welcome-text {
            color: #1b4332;
            text-align: left;
        }

        .welcome-text h1 {
            font-size: 3.5rem;
            margin: 0;
            color: #2d6a4f;
        }

        .welcome-text p {
            font-size: 1.8rem;
            margin: 10px 0 0 0;
            color: #444;
            line-height: 1.4;
        }

        /* ปรับแต่งสำหรับมือถือให้แสดงผลได้ */
        @media (max-width: 800px) {
            .top-header {
                flex-direction: column;
                text-align: center;
            }
            .logo-img {
                width: 90%;
            }
            .welcome-text {
                text-align: center;
            }
        }
    </style>
</head>
<body>

    <header class="top-header">
        <img src="logo.png" alt="โลโก้ไทยช่วยไทย" class="logo-img" onerror="this.src='https://via.placeholder.com/800x400?text=LOGO+800px'">
        
        <div class="welcome-text">
            <h1>ยินดีต้อนรับสู่ไทยช่วยไทย</h1>
            <p>จากมือผู้ผลิต สู่ใจผู้บริโภค<br>โดยไม่ผ่านคนกลาง</p>
        </div>
    </header>

</body>
</html>
